name: AI Docs Generator
description: Generate Markdown docs for a repository using aiwiki

inputs:
  openai_api_key:
    description: OpenAI API key used by Codex CLI
    required: true
  openai_base_url:
    description: Optional OpenAI-compatible base URL (for proxies or compatible APIs)
    required: false
    default: https://api.openai.com/v1
  repo_root:
    description: Repository root to document
    required: false
    default: .
  project_name:
    description: Optional project name override
    required: false
    default: ''
  output_dir:
    description: Optional output directory (relative to repo_root)
    required: false
    default: ''
  model:
    description: Codex model
    required: false
    default: gpt-5-mini
  reasoning_effort:
    description: Reasoning effort (low, medium, high)
    required: false
    default: low
  concurrency:
    description: Number of concurrent page agents
    required: false
    default: '3'
  page_timeout:
    description: Per-page timeout in ms
    required: false
    default: '300000'
  timeout:
    description: Overall timeout in ms
    required: false
    default: '1200000'
  excluded_dirs:
    description: Optional comma-separated directories to exclude
    required: false
    default: ''
  trace_id:
    description: Optional trace ID to tag this run (auto-generated if omitted)
    required: false
    default: ''
  log_level:
    description: Log level (debug, info, warn, error)
    required: false
    default: info

outputs:
  output_dir:
    description: The resolved output directory (relative to repo_root) where docs were written
    value: ${{ steps.generate.outputs.output_dir }}
  trace_id:
    description: The trace ID used for this run
    value: ${{ steps.generate.outputs.trace_id }}
  pr_url:
    description: The URL of the created or updated pull request
    value: ${{ steps.create-pr.outputs.pr_url }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Codex CLI
      shell: bash
      run: npm install -g @openai/codex

    - name: Install mermaid-cli
      shell: bash
      run: npm install -g @mermaid-js/mermaid-cli@11.12.0

    - name: Generate documentation
      id: generate
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        OPENAI_BASE_URL: ${{ inputs.openai_base_url }}
        REPO_ROOT: ${{ inputs.repo_root }}
        PROJECT_NAME: ${{ inputs.project_name }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
        MODEL: ${{ inputs.model }}
        REASONING_EFFORT: ${{ inputs.reasoning_effort }}
        CONCURRENCY: ${{ inputs.concurrency }}
        PAGE_TIMEOUT: ${{ inputs.page_timeout }}
        TIMEOUT: ${{ inputs.timeout }}
        EXCLUDED_DIRS: ${{ inputs.excluded_dirs }}
        TRACE_ID: ${{ inputs.trace_id }}
        LOG_LEVEL: ${{ inputs.log_level }}
      run: |
        set -euo pipefail

        args=(
          --repo-root "$REPO_ROOT"
          --model "$MODEL"
          --reasoning-effort "$REASONING_EFFORT"
          --concurrency "$CONCURRENCY"
          --page-timeout "$PAGE_TIMEOUT"
          --timeout "$TIMEOUT"
          --log-level "$LOG_LEVEL"
        )

        if [[ -n "$PROJECT_NAME" ]]; then
          args+=(--project-name "$PROJECT_NAME")
        fi

        if [[ -n "$OUTPUT_DIR" ]]; then
          args+=(--output-dir "$OUTPUT_DIR")
        fi

        if [[ -n "$EXCLUDED_DIRS" ]]; then
          args+=(--excluded-dirs "$EXCLUDED_DIRS")
        fi

        if [[ -n "$TRACE_ID" ]]; then
          args+=(--trace-id "$TRACE_ID")
        fi

        node "$GITHUB_ACTION_PATH/dist/cli.js" "${args[@]}"

    - name: Create or update docs PR
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO_ROOT: ${{ inputs.repo_root }}
        OUTPUT_DIR: ${{ steps.generate.outputs.output_dir }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        set -euo pipefail

        cd "$REPO_ROOT"

        BRANCH="docs/autogenerated"

        # Check for changes (tracked modifications + untracked files)
        if git diff --quiet -- "$OUTPUT_DIR" && [ -z "$(git ls-files --others --exclude-standard -- "$OUTPUT_DIR")" ]; then
          echo "No documentation changes detected — docs are up to date."
          exit 0
        fi

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Create or reset the docs branch from current HEAD
        git checkout -B "$BRANCH"

        # Stage and commit
        git add "$OUTPUT_DIR"
        git commit -m "docs: update autogenerated documentation"

        # Force-push (overwrites previous run's branch)
        git push --force origin "$BRANCH"

        # Check if a PR already exists
        EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --json url --jq '.[0].url // empty')

        if [[ -n "$EXISTING_PR" ]]; then
          echo "Updated existing PR: $EXISTING_PR"
          echo "pr_url=$EXISTING_PR" >> "$GITHUB_OUTPUT"
        else
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --title "docs: update autogenerated documentation" \
            --body "## Summary
        - Autogenerated documentation update from [aiwiki](https://github.com/tommy5dollar/aiwiki)

        This PR was created automatically. Review the changes and merge when ready.")
          echo "Created PR: $PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        fi
